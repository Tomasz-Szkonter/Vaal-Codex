<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Vaal Codex</title>
    <script>
      // GitHub Pages SPA fallback (rafgraph/spa-github-pages).
      // Rewrites the URL into a query string that index.html decodes back into a real path.
      // pathSegmentsToKeep = 1 because the app is served from /Vaal-Codex/.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
